name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

        # DEBUG - remove after testing
      - name: Debug secret
        run: |
          echo "Username length: ${#DOCKERHUB_USERNAME}"
          echo "First char: ${DOCKERHUB_USERNAME:0:1}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      # 2. Install & Test Backend
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend test/lint
        run: |
          cd backend
          npm test || echo "No backend tests found"

      # 3. Install & Test Frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend test/lint
        run: |
          cd frontend
          npm test -- --watchAll=false || echo "No frontend tests found"

      # 4. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Build & Push Backend Image
      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/student-record-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/student-record-backend:${{ github.sha }}

      # 7. Build & Push Frontend Image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/student-record-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/student-record-frontend:${{ github.sha }}